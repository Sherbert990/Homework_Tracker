<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Charlotte's HW Tracker 🐱</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (periwinkle) -->
    <meta name="theme-color" content="#7a82c8" />
    <meta name="msapplication-TileColor" content="#7a82c8" />

    <!-- Apple PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HW Tracker" />

    <!-- Apple touch icon (home screen icon on iOS) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon_1d98a853.png" />

    <!-- Standard favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32_f812bc9d.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16_2dfea6c3.png" />

    <!-- iOS Splash Screens -->
    <!-- iPad Pro 12.9" -->
    <link rel="apple-touch-startup-image"
      href="/splash-ipad-pro-12-portrait_19f0a62b.png"
      media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad Pro 11" -->
    <link rel="apple-touch-startup-image"
      href="/splash-ipad-pro-11-portrait_8ccb3bf5.png"
      media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad (standard) -->
    <link rel="apple-touch-startup-image"
      href="/splash-ipad-portrait_6e84423a.png"
      media="(device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="Charlotte's personal homework tracker — log daily progress, earn rewards, and see long-term growth." />
    <meta property="og:title" content="Charlotte's HW Tracker" />
    <meta property="og:description" content="Track daily homework, earn rewards, and see long-term progress." />
    <meta property="og:image" content="/icon-512_61b3fa63.png" />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function (reg) {
              console.log('[PWA] Service worker registered:', reg.scope);
            })
            .catch(function (err) {
              console.warn('[PWA] Service worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
